pointcloud_merger:
  ros__parameters:
    primary_topic: livox/lidar_primary
    secondary_topic: livox/lidar_secondary
    output_topic: livox/lidar
    common_frame: primary_mid360
    secondary_frame: secondary_mid360
    sync_tolerance_ms: 10.0
    min_dist_primary_m: 0.4
    min_dist_secondary_m: 0.4
    queue_size: 10
    tf_cache_retry_count: 10
    tf_cache_retry_interval_ms: 500
    # Optional PointCloud2 copy of the merged output for rviz visualization.
    # Production path leaves this off — Point-LIO consumes the CustomMsg
    # output_topic. lidar_only_debug.sh flips it to true via CLI override.
    publish_pc2_preview: false
    pc2_preview_topic: livox/lidar_pc2
