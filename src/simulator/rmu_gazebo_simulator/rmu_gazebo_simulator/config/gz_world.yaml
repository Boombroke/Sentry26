world: "rmuc_2026"

# z_pose 说明:
# - 这里维护的是各世界/出生点“实测可稳定 spawn”的高度，不要简单理解成平台面高度
# - 当前 rmuc_2026 的轮足模型已验证需要 0.72，否则轮子会卡进地图
# - 改出生点、模型几何或 Gazebo 插入语义后，必须重新实测对应世界的稳定值

robots:

  rmuc_2025:
    - name: "red_standard_robot1"
      color: "red"
      x_pose: "3.4"
      y_pose: "9.5"
      z_pose: "0.2000"
      yaw: "0.0"

    - name: "blue_standard_robot1"
      color: "blue"
      x_pose: "25.6"
      y_pose: "6.45"
      z_pose: "0.2000"
      yaw: "3.14"

  rmuc_2026:
    - name: "red_standard_robot1"
      color: "red"
      x_pose: "-11.3"
      y_pose: "1.3"
      z_pose: "0.72"
      yaw: "0.0"

    - name: "blue_standard_robot1"
      color: "blue"
      x_pose: "11.3"
      y_pose: "-1.3"
      z_pose: "0.72"
      yaw: "3.14"

  rmul_2026:
    - name: "red_standard_robot1"
      color: "red"
      x_pose: "0.8"
      y_pose: "3.5"
      z_pose: "0.2030"
      yaw: "0.0"

    # NOTE: Blue robot disabled to improve Gazebo RTF (halves sensor rendering load)
