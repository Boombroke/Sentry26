world: "rmuc_2026"

# z_pose 说明: wheeled_biped 以 base_footprint 作为 placement_frame, create -z
# 直接设置 base_footprint 在世界坐标中的高度, 不能再沿用旧 Mecanum 的“车体中心高度”.
# 这里的值按各场地 mesh 在出生点的实际平台高度填写:
# - rmuc_2025 平台 ≈ 0.2000m
# - rmuc_2026 平台 ≈ 0.4275m
# - rmul_2026 平台 ≈ 0.2030m
# 若修改出生点或场地 mesh, 必须重新量平台高度并同步这里, 否则会出现轮子穿地/悬空.

robots:

  rmuc_2025:
    - name: "red_standard_robot1"
      color: "red"
      x_pose: "3.4"
      y_pose: "9.5"
      z_pose: "0.2000"
      yaw: "0.0"

    - name: "blue_standard_robot1"
      color: "blue"
      x_pose: "25.6"
      y_pose: "6.45"
      z_pose: "0.2000"
      yaw: "3.14"

  rmuc_2026:
    - name: "red_standard_robot1"
      color: "red"
      x_pose: "-11.3"
      y_pose: "1.3"
      z_pose: "0.4275"
      yaw: "0.0"

    - name: "blue_standard_robot1"
      color: "blue"
      x_pose: "11.3"
      y_pose: "-1.3"
      z_pose: "0.4275"
      yaw: "3.14"

  rmul_2026:
    - name: "red_standard_robot1"
      color: "red"
      x_pose: "0.8"
      y_pose: "3.5"
      z_pose: "0.2030"
      yaw: "0.0"

    # NOTE: Blue robot disabled to improve Gazebo RTF (halves sensor rendering load)
    # - name: "blue_standard_robot1"
    #   color: "blue"
    #   x_pose: "11.8"
    #   y_pose: "-3.5"
    #   z_pose: "0.2030"
    #   yaw: "3.14"
