odom_interpolator:
  ros__parameters:
    # 里程计订阅话题
    odom_topic: "/odom"
    
    # 插值后的里程计发布话题
    interpolated_odom_topic: "/odom_interpolated"
    
    # 差分速度发布话题
    diff_vel_topic: "/cmd_vel_diff"
    
    # 外部速度命令订阅话题
    cmd_vel_topic: "/cmd_vel"
    
    # 里程计坐标系（通常为 state_estimation 或 odom）
    odom_frame_id: "odom"
    
    # 机器人坐标系（差速轮足：水平投影 frame）
    robot_frame_id: "base_footprint"
    
    # 插值频率 (Hz)
    interpolation_rate: 100.0

